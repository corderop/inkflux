name: Release-Please

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      # Run on main but just when a new release has been created
      - ".release-please-manifest.json"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Use the config/manifest files created
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
